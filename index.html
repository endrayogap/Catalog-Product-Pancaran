<script>
    // ID GOOGLE SHEETS
    const SPREADSHEET_ID = '1o7QXSLphqQ_cY69UZj5dI2Sj3maNfIrWvyrp38WFsGo';
    const SHEET_NAME = 'Catalog Product'; 
    
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
    
    let allProducts = [];
    let fuse;
    let searchTimeout; // Menyimpan timer debouncing

    // Ambil Data dari Google Sheets
    fetch(url)
        .then(res => res.text())
        .then(data => {
            const json = JSON.parse(data.substr(47).slice(0, -2));
            const rows = json.table.rows;
            
            allProducts = rows
                .filter(row => row.c[0] && row.c[0].v !== 'nama')
                .map(row => {
                    let driveId = '';
                    if (row.c[2] && row.c[2].v) {
                        const rawUrl = row.c[2].v;
                        if (rawUrl.includes('id=')) {
                            driveId = rawUrl.split('id=')[1].split('&')[0];
                        } else if (rawUrl.includes('/d/')) {
                            driveId = rawUrl.split('/d/')[1].split('/')[0];
                        }
                    }

                    // PERBAIKAN: Format URL Direct Link Google Drive yang benar & valid
                    return {
                        nama: row.c[0] ? row.c[0].v : '',
                        sku: row.c[1] ? row.c[1].v : '',
                        foto: driveId ? `https://lh3.googleusercontent.com/d/${driveId}` : 'https://via.placeholder.com/150?text=No+Image'
                    };
                });

            fuse = new Fuse(allProducts, {
                keys: ['nama', 'sku'],
                threshold: 0.3 
            });

            document.getElementById('statusText').innerText = `${allProducts.length} Produk siap dicari.`;
            displayProducts(allProducts.slice(0, 10)); 
        })
        .catch(err => {
            document.getElementById('statusText').innerText = "Gagal memuat database. Periksa ID Google Sheets Anda.";
            console.error(err);
        });

    // Fungsi Menampilkan Produk (Optimasi DOM: Render sekaligus menggunakan .join)
    function displayProducts(products) {
        const grid = document.getElementById('catalogGrid');
        
        if (products.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400">Produk tidak ditemukan.</div>`;
            return;
        }

        // Menggabungkan semua kartu menjadi satu string baru dimasukkan ke DOM
        const cardsHtml = products.map(p => `
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition p-3 flex flex-col justify-between">
                <div class="w-full aspect-square bg-gray-100 rounded mb-3 overflow-hidden img-container">
                    <img src="${p.foto}" alt="${p.nama}" loading="lazy">
                </div>
                <div>
                    <h3 class="text-sm font-semibold text-gray-800 line-clamp-2 mb-1" title="${p.nama}">${p.nama}</h3>
                    <p class="text-xs font-mono text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded inline-block">SKU: ${p.sku}</p>
                </div>
            </div>
        `).join('');

        grid.innerHTML = cardsHtml;
    }

    // Fungsi Pencarian (Optimasi Debounce: Menunda eksekusi sampai ketikan berhenti)
    function searchProduct() {
        clearTimeout(searchTimeout);

        // Tunggu 250ms setelah ketikan terakhir, baru lakukan pencarian
        searchTimeout = setTimeout(() => {
            const query = document.getElementById('searchInput').value;
            
            if (!query.trim()) {
                document.getElementById('statusText').innerText = `${allProducts.length} Produk siap dicari.`;
                displayProducts(allProducts.slice(0, 10)); 
                return;
            }

            const result = fuse.search(query);
            const filteredProducts = result.map(res => res.item);
            
            document.getElementById('statusText').innerText = `Ditemukan ${filteredProducts.length} produk sesuai.`;
            
            // Batasi render maksimal 50 produk teratas hasil pencarian agar performa HP/PC ringan
            displayProducts(filteredProducts.slice(0, 50));
        }, 250); 
    }
</script>
